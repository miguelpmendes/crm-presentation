<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM à Medida — O Novo Paradigma | Deloitte Digital</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #86BC25;
      --green-dim: #6a9a1e;
      --bg: #0d0d0d;
      --bg2: #141414;
      --bg3: #1c1c1c;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --text-muted: #888;
      --text-dim: #bbb;
      --why: #86BC25;
      --how: #00b4d8;
      --what: #c77dff;
      --transition: 0.55s cubic-bezier(0.77,0,0.175,1);
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text); }

    /* ── DECK ── */
    #deck { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

    .slide {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 36px 56px 48px;
      opacity: 0; transform: translateX(60px);
      transition: opacity var(--transition), transform var(--transition);
      pointer-events: none;
    }
    .slide.active  { opacity: 1; transform: translateX(0); pointer-events: all; }
    .slide.exit    { opacity: 0; transform: translateX(-60px); }

    /* ── SECTION TAG ── */
    .section-tag {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 10.5px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
      padding: 5px 14px; border-radius: 20px; margin-bottom: 24px;
    }
    .tag-why  { color:var(--why);  background:rgba(134,188,37,0.1);  border:1px solid rgba(134,188,37,0.25); }
    .tag-how  { color:var(--how);  background:rgba(0,180,216,0.08);  border:1px solid rgba(0,180,216,0.25); }
    .tag-what { color:var(--what); background:rgba(199,125,255,0.08);border:1px solid rgba(199,125,255,0.25);}

    /* ── TYPOGRAPHY ── */
    .headline {
      font-size: clamp(1.9rem, 4vw, 3.4rem); font-weight: 800;
      line-height: 1.1; text-align: center; letter-spacing: -0.02em; max-width: 920px;
    }
    .subheadline {
      font-size: clamp(.9rem, 1.6vw, 1.25rem); font-weight: 300; color: var(--text-dim);
      text-align: center; max-width: 740px; margin-top: 14px; line-height: 1.65;
    }
    .accent      { color: var(--green); }
    .accent-how  { color: var(--how); }
    .accent-what { color: var(--what); }

    /* ── CARDS ── */
    .cards-row { display:flex; gap:18px; margin-top:32px; width:100%; max-width:1100px; }
    .card {
      flex:1; background:var(--bg3); border:1px solid var(--border);
      border-radius:14px; padding:24px 22px; position:relative; overflow:hidden;
    }
    .card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; }
    .card.g::before { background:var(--green); }
    .card.b::before { background:var(--how); }
    .card.p::before { background:var(--what); }
    .card-icon  { font-size:26px; margin-bottom:12px; }
    .card-title { font-size:16px; font-weight:700; margin-bottom:8px; }
    .card-body  { font-size:14px; color:var(--text-dim); line-height:1.65; }

    /* ── CARDS CONSEQUENCE ── */
    .cc-top { display:flex; gap:18px; width:100%; max-width:860px; margin-top:28px; }
    .cc-connectors { display:flex; justify-content:center; align-items:flex-start; width:100%; max-width:860px; height:48px; position:relative; }
    .cc-connectors svg { position:absolute; top:0; left:0; width:100%; height:100%; overflow:visible; }
    .cc-bottom { width:100%; max-width:860px; }
    .card-consequence {
      background:linear-gradient(135deg,rgba(134,188,37,.09),rgba(134,188,37,.03));
      border:1px solid rgba(134,188,37,.4); border-radius:14px; padding:24px 28px;
      position:relative; overflow:hidden; text-align:center;
    }
    .card-consequence::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:var(--green); }
    .consequence-label { font-size:9px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--green); margin-bottom:10px; }

    /* ── TWO-COL ── */
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:24px; width:100%; max-width:1060px; margin-top:28px; }
    .col-block { background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:24px; }
    .col-block h3 { font-size:16px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
    .col-block ul { list-style:none; display:flex; flex-direction:column; gap:9px; }
    .col-block li { font-size:14px; color:var(--text-dim); padding-left:18px; position:relative; line-height:1.6; }
    .col-block li::before { content:'▪'; position:absolute; left:0; color:var(--text-muted); font-size:11px; top:2px; }
    .col-block.red h3 { color: #e05555; }

    /* ── CALLOUT ── */
    .callout {
      max-width:820px; background:linear-gradient(135deg,rgba(134,188,37,.07),rgba(134,188,37,.03));
      border:1px solid rgba(134,188,37,.2); border-radius:14px;
      padding:22px 32px; text-align:center; margin-top:24px;
    }
    .callout p { font-size:clamp(.9rem,1.5vw,1.15rem); font-style:italic; font-weight:300; line-height:1.6; color:var(--text-dim); }
    .callout strong { color:var(--text); font-weight:700; font-style:normal; }
    .callout.how  { background:linear-gradient(135deg,rgba(0,180,216,.07),rgba(0,180,216,.02)); border-color:rgba(0,180,216,.2); }
    .callout.what { background:linear-gradient(135deg,rgba(199,125,255,.07),rgba(199,125,255,.02)); border-color:rgba(199,125,255,.2); }

    /* ── STATS ── */
    .stat-row { display:flex; gap:20px; margin-top:28px; max-width:960px; width:100%; }
    .stat-box { flex:1; text-align:center; background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:24px 16px; }
    .stat-num   { font-size:clamp(1.8rem,3.5vw,3rem); font-weight:900; letter-spacing:-.03em; line-height:1; }
    .stat-label { font-size:13.5px; color:var(--text-muted); margin-top:8px; line-height:1.5; }

    /* ── AGENT DIAGRAM ── */
    .agent-wrap { display:flex; flex-direction:column; align-items:center; margin-top:28px; max-width:940px; width:100%; }
    .agent-orch {
      background:linear-gradient(135deg,rgba(134,188,37,.12),rgba(134,188,37,.04));
      border:1px solid rgba(134,188,37,.35); border-radius:12px;
      padding:14px 32px; text-align:center; min-width:280px;
    }
    .agent-connector { width:1px; height:28px; background:linear-gradient(to bottom,rgba(134,188,37,.4),rgba(134,188,37,.1)); }
    .agent-row { display:flex; gap:14px; }
    .agent-node { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:12px 18px; text-align:center; min-width:148px; }
    .agent-node.c-green  { border-color:rgba(134,188,37,.3); }
    .agent-node.c-how    { border-color:rgba(0,180,216,.3); }
    .agent-node.c-what   { border-color:rgba(199,125,255,.3); }
    .agent-node.c-yellow { border-color:rgba(255,200,50,.3); }
    .node-label { font-size:9px; letter-spacing:2px; font-weight:700; text-transform:uppercase; color:var(--text-muted); margin-bottom:4px; }
    .node-name  { font-size:14px; font-weight:700; }

    /* ── CYCLE ── */
    .cycle-row { display:flex; align-items:stretch; gap:0; max-width:1100px; width:100%; margin-top:32px; }
    .cycle-step { flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:26px 18px; text-align:center; }
    .cycle-num { width:30px; height:30px; border-radius:50%; background:rgba(0,180,216,.12); border:1px solid rgba(0,180,216,.3); color:var(--how); font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; }
    .cycle-title { font-size:16px; font-weight:700; margin-bottom:10px; }
    .cycle-body  { font-size:14px; color:var(--text-muted); line-height:1.6; }
    .cycle-arrow { font-size:16px; color:var(--text-muted); padding:0 4px; flex-shrink:0; padding-top:36px; }

    /* ── PILLARS ── */
    .pillars-row { display:flex; gap:0; max-width:1050px; width:100%; margin-top:28px; align-items:stretch; }
    .pillar { flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:24px 20px; text-align:center; position:relative; overflow:hidden; display:flex; flex-direction:column; }
    .pillar::after { content:''; position:absolute; bottom:0;left:0;right:0; height:3px; }
    .p1::after { background:linear-gradient(90deg,#f7c59f,#ef8c5b); }
    .p2::after { background:linear-gradient(90deg,var(--green),var(--green-dim,#6a9a1e)); }
    .p3::after { background:linear-gradient(90deg,var(--how),#0077b6); }
    .pillar-bg-num { font-size:42px; font-weight:900; opacity:.07; position:absolute; top:10px;right:14px; line-height:1; }
    .pillar-icon  { font-size:28px; margin-bottom:12px; }
    .pillar-title { font-size:17px; font-weight:800; margin-bottom:9px; }
    .pillar-body  { font-size:15px; color:var(--text-dim); line-height:1.6; }
    .pillar-tag   { display:inline-block; font-size:9.5px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-top:auto; padding-top:12px; padding-left:10px; padding-right:10px; padding-bottom:3px; border-radius:10px; background:rgba(255,255,255,.06); color:var(--text-muted); align-self:center; }
    .plus-sign { font-size:24px; font-weight:200; color:var(--text-muted); display:flex; align-items:center; padding:0 6px; align-self:center; }
    .equals-row { margin-top:18px; max-width:1050px; width:100%; background:linear-gradient(135deg,rgba(134,188,37,.07),rgba(0,180,216,.05)); border:1px solid rgba(134,188,37,.2); border-radius:10px; padding:14px 24px; text-align:center; font-size:14px; font-weight:600; color:var(--text); }
    .equals-row .eq-accent { color:var(--green); }

    /* ── VIBE CODING ── */
    .vc-wrap { display:flex; flex-direction:column; gap:36px; width:100%; max-width:1060px; margin-top:28px; }
    .vc-quote { border-left:3px solid var(--green); background:rgba(134,188,37,.06); border-radius:0 10px 10px 0; padding:12px 20px; }
    .vc-quote p { font-size:13.5px; font-style:italic; color:var(--text-dim); line-height:1.5; }
    .vc-quote cite { font-size:11px; color:var(--text-muted); margin-top:4px; display:block; font-style:normal; }
    .vc-desc { font-size:13px; color:var(--text-dim); line-height:1.6; }
    .vc-section-label { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--green); margin-bottom:8px; }
    .vc-loop { display:flex; align-items:center; gap:0; }
    .vc-loop-box { flex:1; border:1px solid rgba(134,188,37,.45); border-radius:10px; padding:12px 10px; text-align:center; font-size:13px; font-weight:700; background:rgba(134,188,37,.05); position:relative; }
    .vc-arrow { color:var(--green); font-size:18px; padding:0 8px; flex-shrink:0; }
    .vc-feedback { text-align:center; font-size:10px; color:rgba(134,188,37,.5); letter-spacing:1px; margin-top:4px; }
    .vc-bottom { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .vc-tools-row { display:flex; gap:8px; }
    .vc-tool { flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:10px 12px; text-align:center; }
    .vc-tool-name { font-size:12px; font-weight:700; }
    .vc-tool-sub  { font-size:10px; color:var(--text-muted); margin-top:3px; }
    .vc-maturity-title { font-size:clamp(1.2rem,2.2vw,1.7rem); font-weight:800; text-align:center; margin:8px 0 20px; letter-spacing:-.01em; }
    .vc-maturity  { display:flex; gap:20px; justify-content:center; width:100%; }
    .vc-mat-col { flex:1; max-width:420px; background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:24px 28px; }
    .vc-mat-col ul { list-style:none; margin-top:10px; display:flex; flex-direction:column; gap:8px; }
    .vc-mat-col li { font-size:15px; color:var(--text-dim); padding-left:18px; position:relative; line-height:1.5; }
    .vc-mat-col li::before { content:'▪'; position:absolute; left:0; font-size:11px; top:2px; }
    .vc-mat-strong li::before { color:var(--green); }
    .vc-mat-weak   li::before { color:#e05555; }
    .vc-mat-head { font-size:11px; font-weight:700; display:flex; align-items:center; gap:6px; }
    .dot-green { width:8px; height:8px; border-radius:50%; background:var(--green); flex-shrink:0; }
    .dot-red   { width:8px; height:8px; border-radius:50%; background:#e05555; flex-shrink:0; }

    /* ── TCO TABLE ── */
    .tco-wrap { width:100%; max-width:1040px; margin-top:24px; overflow:hidden; border-radius:14px; border:1px solid var(--border); }
    .tco-table { width:100%; border-collapse:collapse; font-size:14px; }
    .tco-table th { padding:13px 18px; text-align:left; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; font-weight:700; background:var(--bg3); border-bottom:1px solid var(--border); color:var(--text-muted); }
    .tco-table th.col-custom { color:var(--green); }
    .tco-table th.col-sf  { color:#00a1e0; }
    .tco-table th.col-dyn { color:#00a4ef; }
    .tco-table td { padding:11px 18px; border-bottom:1px solid var(--border); color:var(--text-dim); vertical-align:middle; }
    .tco-table tr:last-child td { border-bottom:none; }
    .tco-table tr:nth-child(even) td { background:rgba(255,255,255,.015); }
    .tco-table td.row-label { font-weight:600; color:var(--text); font-size:12px; }
    .tco-table td.v-green { color:var(--green); font-weight:700; }
    .tco-table td.v-red   { color:#e05555; font-weight:600; }
    .tco-table tr.tco-total td { background:rgba(134,188,37,.06); font-weight:800; font-size:13.5px; }
    .tco-table tr.tco-total td.v-green { font-size:15px; }
    .tco-note { font-size:10.5px; color:var(--text-muted); margin-top:10px; text-align:center; max-width:1040px; line-height:1.5; }

    /* ── PROTOTYPE ── */
    .proto-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; max-width:940px; width:100%; margin-top:24px; }
    .proto-frame { background:var(--bg3); border:1px solid var(--border); border-radius:12px; aspect-ratio:16/9; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--text-muted); position:relative; overflow:hidden; }
    .proto-bar { position:absolute; top:0;left:0;right:0; height:26px; background:rgba(255,255,255,.04); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 10px; gap:5px; }
    .proto-dot { width:7px; height:7px; border-radius:50%; }
    .proto-icon  { font-size:26px; }
    .proto-label { font-weight:700; font-size:12px; color:var(--text); }
    .proto-sub   { font-size:10.5px; color:var(--text-muted); text-align:center; padding:0 12px; }

    /* ── EPIC TABLE ── */
    .epic-wrap { width:100%; max-width:1100px; margin-top:22px; overflow:hidden; border-radius:14px; border:1px solid var(--border); }
    .epic-table { width:100%; border-collapse:collapse; font-size:12px; }
    .epic-table th { padding:11px 16px; font-size:9.5px; letter-spacing:1.5px; text-transform:uppercase; font-weight:700; background:var(--bg3); border-bottom:1px solid var(--border); color:var(--text-muted); text-align:left; }
    .epic-table td { padding:10px 16px; border-bottom:1px solid rgba(255,255,255,.04); color:var(--text-dim); vertical-align:top; }
    .epic-table tr:last-child td { border-bottom:none; }
    .epic-name { font-weight:700; color:var(--text) !important; }
    .badge { display:inline-block; font-size:9px; font-weight:700; letter-spacing:1px; padding:2px 8px; border-radius:9px; text-transform:uppercase; }
    .badge-poc  { background:rgba(134,188,37,.13); color:var(--green); border:1px solid rgba(134,188,37,.3); }
    .badge-mvp  { background:rgba(0,180,216,.1);   color:var(--how);   border:1px solid rgba(0,180,216,.3); }
    .badge-full { background:rgba(199,125,255,.1);  color:var(--what);  border:1px solid rgba(199,125,255,.3); }
    .badge-tobe { background:rgba(255,180,0,.1);    color:rgba(255,180,0,.8); border:1px solid rgba(255,180,0,.3); }

    /* ── ROADMAP ── */
    .roadmap-row { display:flex; gap:0; width:100%; max-width:1040px; margin-top:52px; position:relative; }
    .roadmap-row::before { content:''; position:absolute; top:8px; left:calc(16.5% - 1px); right:calc(16.5% - 1px); height:2px; background:linear-gradient(90deg,var(--green),var(--how),var(--what)); }
    .rm-phase { flex:1; display:flex; flex-direction:column; align-items:center; align-self:stretch; }
    .rm-dot { width:16px; height:16px; border-radius:50%; border:2px solid; background:var(--bg); margin-bottom:18px; z-index:1; flex-shrink:0; }
    .rm-dot.g { border-color:var(--green); background:var(--green); box-shadow:0 0 10px var(--green); }
    .rm-dot.b { border-color:var(--how);   background:var(--how);   box-shadow:0 0 10px var(--how); }
    .rm-dot.p { border-color:var(--what);  background:var(--what);  box-shadow:0 0 10px var(--what); }
    .rm-card { background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:18px; width:92%; text-align:center; flex:1; }
    .rm-duration { font-size:9.5px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:5px; }
    .rm-title { font-size:18px; font-weight:800; margin-bottom:9px; }
    .rm-items { font-size:14px; color:var(--text-dim); line-height:1.7; }

    /* ── COVER ── */
    .cover-grid { position:absolute; inset:0; background-image:linear-gradient(rgba(134,188,37,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(134,188,37,.025) 1px,transparent 1px); background-size:60px 60px; pointer-events:none; }
    .cover-glow { position:absolute; width:700px; height:700px; border-radius:50%; background:radial-gradient(circle,rgba(134,188,37,.055) 0%,transparent 70%); pointer-events:none; }
    .cover-logo { font-size:12px; font-weight:700; letter-spacing:3.5px; color:var(--green); text-transform:uppercase; margin-bottom:48px; }
    .cover-title { font-size:clamp(2.6rem,5.5vw,4.8rem); font-weight:900; letter-spacing:-.03em; line-height:1.0; text-align:center; }
    .cover-sub { font-size:clamp(.9rem,1.7vw,1.25rem); font-weight:300; color:var(--text-dim); text-align:center; margin-top:18px; max-width:640px; line-height:1.65; }
    .cover-tags { display:flex; gap:12px; margin-top:48px; }
    .cover-tag { font-size:10.5px; font-weight:700; letter-spacing:2.5px; padding:7px 20px; border-radius:22px; border:1px solid; }
    .ct-why  { color:var(--why);  border-color:rgba(134,188,37,.4);  background:rgba(134,188,37,.07); }
    .ct-how  { color:var(--how);  border-color:rgba(0,180,216,.4);   background:rgba(0,180,216,.07); }
    .ct-what { color:var(--what); border-color:rgba(199,125,255,.4); background:rgba(199,125,255,.07); }

    /* ── CLOSING ── */
    .closing-title { font-size:clamp(2.4rem,5vw,4.4rem); font-weight:900; letter-spacing:-.03em; text-align:center; line-height:1.05; }
    .closing-items { display:flex; flex-direction:column; gap:14px; margin-top:36px; max-width:660px; width:100%; }
    .closing-item { display:flex; align-items:center; gap:14px; background:var(--bg3); border:1px solid var(--border); border-radius:11px; padding:15px 20px; }
    .ci-num { width:30px; height:30px; border-radius:50%; background:rgba(134,188,37,.13); border:1px solid rgba(134,188,37,.3); color:var(--green); font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .ci-text { font-size:13px; color:var(--text-dim); line-height:1.45; }

    /* ── NAVIGATION ── */
    #nav { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:14px; z-index:100; background:rgba(18,18,18,.9); backdrop-filter:blur(14px); border:1px solid var(--border); border-radius:50px; padding:9px 18px; }
    .nav-btn { background:none; border:1px solid var(--border); color:var(--text); width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; transition:background .2s,border-color .2s; }
    .nav-btn:hover { background:var(--bg3); border-color:var(--green); }
    .nav-btn:disabled { opacity:.3; cursor:default; }
    #slide-counter { font-size:11.5px; font-weight:600; color:var(--text-muted); min-width:48px; text-align:center; }

    #progress { position:fixed; top:0;left:0; height:2px; background:linear-gradient(90deg,var(--green),var(--how)); transition:width .4s ease; z-index:100; }

    /* ── LOGIN ── */
    #login-screen {
      position:fixed; inset:0; z-index:1000;
      background:var(--bg);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:0;
    }
    #login-screen .login-grid {
      position:absolute; inset:0;
      background-image:linear-gradient(rgba(134,188,37,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(134,188,37,.025) 1px,transparent 1px);
      background-size:60px 60px; pointer-events:none;
    }
    #login-screen .login-glow {
      position:absolute; width:600px; height:600px; border-radius:50%;
      background:radial-gradient(circle,rgba(134,188,37,.05) 0%,transparent 70%);
      pointer-events:none;
    }
    .login-box {
      position:relative; z-index:1;
      background:var(--bg3); border:1px solid var(--border);
      border-radius:20px; padding:48px 52px;
      width:420px; display:flex; flex-direction:column; align-items:center; gap:0;
    }
    .login-logo { font-size:11px; font-weight:700; letter-spacing:3.5px; color:var(--green); text-transform:uppercase; margin-bottom:32px; }
    .login-title { font-size:22px; font-weight:800; letter-spacing:-.02em; margin-bottom:6px; text-align:center; }
    .login-sub { font-size:13px; color:var(--text-muted); margin-bottom:36px; text-align:center; }
    .login-field { width:100%; margin-bottom:14px; }
    .login-field label { display:block; font-size:10.5px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); margin-bottom:7px; }
    .login-field input {
      width:100%; background:var(--bg2); border:1px solid var(--border);
      border-radius:10px; padding:12px 16px; font-size:14px; color:var(--text);
      outline:none; transition:border-color .2s; font-family:inherit;
    }
    .login-field input:focus { border-color:rgba(134,188,37,.5); }
    .login-field input.error { border-color:#e05555; }
    .login-btn {
      width:100%; margin-top:8px; padding:14px;
      background:var(--green); color:#000; font-size:14px; font-weight:800;
      border:none; border-radius:10px; cursor:pointer; letter-spacing:.5px;
      transition:background .2s; font-family:inherit;
    }
    .login-btn:hover { background:#9acf2e; }
    .login-error { font-size:12px; color:#e05555; margin-top:14px; text-align:center; min-height:18px; }
    .login-footer-note { position:absolute; bottom:28px; font-size:10px; color:var(--text-muted); z-index:1; }

    #footer { position:fixed; bottom:0; left:0; right:0; height:32px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:500; letter-spacing:0.5px; color:var(--text-muted); border-top:1px solid var(--border); background:rgba(13,13,13,0.85); backdrop-filter:blur(8px); z-index:99; }

    #section-indicator { position:fixed; top:22px; right:28px; display:flex; gap:8px; z-index:100; align-items:center; }
    .pill { font-size:10px; font-weight:700; letter-spacing:2px; padding:4px 11px; border-radius:18px; border:1px solid transparent; color:var(--text-muted); transition:all .3s; cursor:pointer; }
    .pill:hover { opacity:.8; }
    .pill.why-p  { border-color:rgba(134,188,37,.18); }
    .pill.how-p  { border-color:rgba(0,180,216,.18); }
    .pill.what-p { border-color:rgba(199,125,255,.18); }
    .pill.why-p.on  { background:rgba(134,188,37,.13); color:var(--why);  border-color:rgba(134,188,37,.45); }
    .pill.how-p.on  { background:rgba(0,180,216,.1);  color:var(--how);  border-color:rgba(0,180,216,.45); }
    .pill.what-p.on { background:rgba(199,125,255,.09);color:var(--what); border-color:rgba(199,125,255,.45); }

    /* ── TWO PATHS ── */
    .tp-row { display:flex; gap:0; align-items:stretch; width:100%; max-width:1060px; margin-top:26px; }
    .tp-card { flex:1; background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:26px 28px; display:flex; flex-direction:column; gap:10px; position:relative; overflow:hidden; }
    .tp-card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; }
    .tp-card-how::before   { background:var(--how); }
    .tp-card-green::before { background:var(--green); }
    .tp-icon  { font-size:28px; }
    .tp-title { font-size:18px; font-weight:800; }
    .tp-body  { font-size:14px; color:var(--text-dim); line-height:1.6; }
    .tp-items { list-style:none; display:flex; flex-direction:column; gap:7px; margin-top:4px; flex:1; }
    .tp-items li { font-size:13.5px; color:var(--text-dim); display:flex; align-items:flex-start; gap:8px; line-height:1.5; }
    .tp-bullet { flex-shrink:0; margin-top:1px; font-size:11px; }
    .tp-accel-label { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); margin-top:6px; }
    .tp-next-tag { align-self:flex-start; margin-top:auto; padding-top:14px; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:6px 16px; border-radius:20px; border:1px solid rgba(199,125,255,.4); color:var(--what); background:rgba(199,125,255,.08); cursor:default; }
    .tp-divider { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 20px; }
    .tp-divider::before, .tp-divider::after { content:''; flex:1; width:1px; background:var(--border); }
    .tp-or { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); padding:10px 0; }

    /* ── LANG TOGGLE ── */
    .lang-sep { width:1px; height:16px; background:var(--border); margin:0 4px; }
    .lang-toggle { display:flex; gap:2px; background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:18px; padding:2px; }
    .lang-btn { font-size:10px; font-weight:700; letter-spacing:1.5px; padding:3px 10px; border-radius:14px; border:none; background:none; color:var(--text-muted); cursor:pointer; transition:all .2s; font-family:inherit; }
    .lang-btn:hover { color:var(--text); }
    .lang-btn.active-lang { background:var(--bg3); color:var(--green); border:1px solid rgba(134,188,37,.35); }

    /* ── COMMENTS ── */
    .comment-card { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
    .comment-card.resolved { opacity:.5; }
    .comment-card.resolved .comment-text { text-decoration:line-through; color:var(--text-muted); }
    .comment-author { font-size:11px; font-weight:700; color:var(--green); margin-bottom:4px; }
    .comment-card.resolved .comment-author { color:var(--text-muted); }
    .comment-time { font-size:10px; color:var(--text-muted); margin-bottom:6px; }
    .comment-text { font-size:13px; color:var(--text-dim); line-height:1.5; margin-bottom:10px; }
    .comment-actions { display:flex; gap:6px; align-items:center; }
    .comment-action-btn { font-size:10px; font-weight:700; padding:3px 10px; border-radius:8px; border:1px solid var(--border); background:none; color:var(--text-muted); cursor:pointer; font-family:inherit; }
    .comment-action-btn:hover { border-color:var(--green); color:var(--green); }
    .comment-action-btn.delete:hover { border-color:#e05555; color:#e05555; }
    .comment-resolved-label { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); margin-left:auto; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-grid"></div>
  <div class="login-glow"></div>
  <div class="login-box">
    <div class="login-logo">Deloitte Technology</div>
    <div class="login-title" id="login-title">Acesso Restrito</div>
    <div class="login-sub" id="login-sub">Introduza as suas credenciais para continuar.</div>
    <div class="login-field">
      <label id="login-user-label">Utilizador</label>
      <input type="text" id="login-user" autocomplete="username" placeholder="utilizador" />
    </div>
    <div class="login-field">
      <label id="login-pass-label">Password</label>
      <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••" />
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
    <div class="lang-toggle" style="margin-top:18px;">
      <button class="lang-btn active-lang" data-lang="pt" onclick="setLang('pt')">PT</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <div class="login-footer-note">Copyright 2026 Technology S.A. All rights reserved.</div>
</div>

<!-- Modal de nome do colaborador -->
<div id="author-modal" style="display:none; position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,0.7); align-items:center; justify-content:center;">
  <div style="background:var(--bg3); border:1px solid var(--border); border-radius:16px; padding:40px 44px; width:360px; display:flex; flex-direction:column; gap:16px;">
    <div style="font-size:15px; font-weight:700;" id="author-modal-label"></div>
    <input id="author-name-input" type="text" style="background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:11px 14px; font-size:14px; color:var(--text); outline:none; font-family:inherit;" />
    <button onclick="confirmAuthorName()" id="author-modal-btn" style="background:var(--green); color:#000; font-weight:800; border:none; border-radius:10px; padding:12px; cursor:pointer; font-family:inherit; font-size:14px;"></button>
  </div>
</div>

<!-- Painel de comentários -->
<div id="comments-panel" style="position:fixed; top:0; right:0; width:340px; height:100vh; background:var(--bg2); border-left:1px solid var(--border); z-index:500; transform:translateX(100%); transition:transform 0.35s cubic-bezier(0.77,0,0.175,1); display:flex; flex-direction:column; padding:24px 20px 16px;">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
    <span id="comments-panel-title" style="font-size:15px; font-weight:800;"></span>
    <button onclick="toggleComments()" style="background:none; border:1px solid var(--border); color:var(--text-muted); width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:14px;">✕</button>
  </div>
  <div id="comments-list" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; margin-bottom:16px;"></div>
  <div style="border-top:1px solid var(--border); padding-top:14px; display:flex; flex-direction:column; gap:8px;">
    <textarea id="comment-text" rows="3" style="background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-size:13px; color:var(--text); resize:none; outline:none; font-family:inherit;"></textarea>
    <button onclick="addComment()" id="comments-add-btn" style="background:var(--green); color:#000; font-weight:800; border:none; border-radius:10px; padding:10px; cursor:pointer; font-family:inherit; font-size:13px;"></button>
    <div style="display:flex; gap:8px; margin-top:4px;">
      <button onclick="exportComments()" id="comments-export-btn" style="flex:1; background:none; border:1px solid var(--border); color:var(--text-muted); border-radius:8px; padding:7px; cursor:pointer; font-size:11px; font-weight:700; font-family:inherit;"></button>
      <label style="flex:1; background:none; border:1px solid var(--border); color:var(--text-muted); border-radius:8px; padding:7px; cursor:pointer; font-size:11px; font-weight:700; text-align:center; display:flex; align-items:center; justify-content:center;">
        <span id="comments-import-btn"></span>
        <input type="file" accept=".json" onchange="importComments(event)" style="display:none;" />
      </label>
    </div>
  </div>
</div>

<div id="progress"></div>
<div id="section-indicator">
  <span class="pill why-p" onclick="goToSection('why')">WHY</span>
  <span class="pill how-p" onclick="goToSection('how')">HOW</span>
  <span class="pill what-p" onclick="goToSection('what')">WHAT</span>
  <div class="lang-sep"></div>
  <div class="lang-toggle">
    <button class="lang-btn active-lang" data-lang="pt" onclick="setLang('pt')">PT</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
  </div>
</div>
<div id="deck"></div>
<div id="footer">Copyright 2026 Technology S.A. All rights reserved.</div>
<div id="nav">
  <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" disabled>←</button>
  <span id="slide-counter"></span>
  <button class="nav-btn" id="comments-toggle-btn" onclick="toggleComments()" title="Comentários" style="position:relative;">
    💬<span id="comments-badge" style="display:none; position:absolute; top:-4px; right:-4px; background:var(--green); color:#000; font-size:9px; font-weight:900; width:16px; height:16px; border-radius:50%; align-items:center; justify-content:center;"></span>
  </button>
  <button class="nav-btn" id="next-btn" onclick="navigate(1)">→</button>
</div>

<!-- Content file — edit crm-presentation-content.js to update all texts -->
<script src="crm-presentation-content.js"></script>

<script>
// ── LOGIN ────────────────────────────────────────────────
function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err  = document.getElementById('login-error');
  const ui   = document.getElementById('login-user');
  const pi   = document.getElementById('login-pass');

  if (user === AUTH.username && pass === AUTH.password) {
    document.getElementById('login-screen').style.display = 'none';
    err.textContent = '';
    ui.classList.remove('error');
    pi.classList.remove('error');
  } else {
    err.textContent = UI_STRINGS[currentLang].loginError;
    ui.classList.add('error');
    pi.classList.add('error');
    pi.value = '';
    pi.focus();
  }
}

function updateLoginLang() {
  const s = UI_STRINGS[currentLang];
  document.getElementById('login-title').textContent     = s.loginTitle;
  document.getElementById('login-sub').textContent       = s.loginSub;
  document.getElementById('login-user-label').textContent = s.loginUserLabel;
  document.getElementById('login-user').placeholder      = s.loginUserPlaceholder;
  document.getElementById('login-pass-label').textContent = s.loginPassLabel;
  document.getElementById('login-btn').textContent       = s.loginBtn;
  document.getElementById('login-error').textContent     = '';
}

// Allow Enter key to submit
document.addEventListener('DOMContentLoaded', () => {
  if (!AUTH.enabled) document.getElementById('login-screen').style.display = 'none';

  ['login-user','login-pass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });
});

// ── COMMENTS ─────────────────────────────────────────────
const COMMENTS_KEY = document.title.toLowerCase().replace(/[^a-z0-9]/g,'-') + '-comments';
let commentsOpen = false;

function getComments() {
  try { return JSON.parse(localStorage.getItem(COMMENTS_KEY) || '{}'); } catch { return {}; }
}
function saveComments(data) { localStorage.setItem(COMMENTS_KEY, JSON.stringify(data)); }
function getAuthorName() { return localStorage.getItem('presenter-author-name') || ''; }
function slideKey(idx) { return 'slide-' + idx; }

function toggleComments() {
  if (!commentsOpen && !getAuthorName()) {
    openAuthorModal(() => openCommentsPanel());
    return;
  }
  commentsOpen ? closeCommentsPanel() : openCommentsPanel();
}

function openAuthorModal(cb) {
  const modal = document.getElementById('author-modal');
  const s = UI_STRINGS[currentLang];
  document.getElementById('author-modal-label').textContent = s.commentsNameModal;
  document.getElementById('author-modal-btn').textContent   = s.commentsNameBtn;
  document.getElementById('author-name-input').value = '';
  modal.style.display = 'flex';
  document.getElementById('author-name-input').focus();
  window._authorModalCb = cb;
  document.getElementById('author-name-input').onkeydown = e => { if (e.key === 'Enter') confirmAuthorName(); };
}

function confirmAuthorName() {
  const val = document.getElementById('author-name-input').value.trim();
  if (!val) return;
  localStorage.setItem('presenter-author-name', val);
  document.getElementById('author-modal').style.display = 'none';
  if (window._authorModalCb) { window._authorModalCb(); window._authorModalCb = null; }
}

function openCommentsPanel() {
  commentsOpen = true;
  document.getElementById('comments-panel').style.transform = 'translateX(0)';
  renderComments();
  updateCommentsPanelStrings();
}

function closeCommentsPanel() {
  commentsOpen = false;
  document.getElementById('comments-panel').style.transform = 'translateX(100%)';
}

function updateCommentsPanelStrings() {
  const s = UI_STRINGS[currentLang];
  document.getElementById('comments-panel-title').textContent = s.commentsPanelTitle;
  const ta = document.getElementById('comment-text');
  if (ta) ta.placeholder = s.commentsTextPlaceholder;
  document.getElementById('comments-add-btn').textContent    = s.commentsAddBtn;
  document.getElementById('comments-export-btn').textContent = s.commentsExportBtn;
  document.getElementById('comments-import-btn').textContent = s.commentsImportBtn;
}

function renderComments() {
  const list  = document.getElementById('comments-list');
  const key   = slideKey(current);
  const data  = getComments();
  const items = (data[key] || []).slice().reverse();
  const s     = UI_STRINGS[currentLang];

  if (!items.length) {
    list.innerHTML = `<div style="font-size:13px; color:var(--text-muted); text-align:center; margin-top:20px;">${s.commentsEmpty}</div>`;
    return;
  }

  list.innerHTML = items.map(c => `
    <div class="comment-card ${c.resolved ? 'resolved' : ''}">
      <div style="display:flex; align-items:flex-start; justify-content:space-between;">
        <div class="comment-author">${c.author}</div>
        ${c.resolved ? `<span class="comment-resolved-label">${s.commentsResolved}</span>` : ''}
      </div>
      <div class="comment-time">${new Date(c.timestamp).toLocaleString()}</div>
      <div class="comment-text">${c.text}</div>
      <div class="comment-actions">
        <button class="comment-action-btn" onclick="toggleResolve('${c.id}')">${c.resolved ? s.commentsReopenBtn : s.commentsResolveBtn}</button>
        <button class="comment-action-btn delete" onclick="deleteComment('${c.id}')">${s.commentsDeleteBtn}</button>
      </div>
    </div>`).join('');
}

function addComment() {
  const ta     = document.getElementById('comment-text');
  const text   = ta.value.trim();
  const author = getAuthorName();
  if (!text || !author) return;
  const data = getComments();
  const key  = slideKey(current);
  if (!data[key]) data[key] = [];
  data[key].push({
    id: (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2),
    author, text,
    timestamp: new Date().toISOString(),
    resolved: false
  });
  saveComments(data);
  ta.value = '';
  renderComments();
  updateCommentsBadge();
}

function toggleResolve(id) {
  const data = getComments();
  const key  = slideKey(current);
  const c    = (data[key] || []).find(x => x.id === id);
  if (c) { c.resolved = !c.resolved; saveComments(data); renderComments(); updateCommentsBadge(); }
}

function deleteComment(id) {
  const data = getComments();
  const key  = slideKey(current);
  data[key]  = (data[key] || []).filter(x => x.id !== id);
  saveComments(data);
  renderComments();
  updateCommentsBadge();
}

function updateCommentsBadge() {
  const data  = getComments();
  const count = (data[slideKey(current)] || []).filter(c => !c.resolved).length;
  const badge = document.getElementById('comments-badge');
  if (!badge) return;
  badge.textContent   = count;
  badge.style.display = count > 0 ? 'flex' : 'none';
}

function exportComments() {
  const data = getComments();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = document.title.toLowerCase().replace(/[^a-z0-9]/g,'-') + '-comments.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importComments(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const incoming = JSON.parse(e.target.result);
      const existing = getComments();
      let merged = 0;
      for (const key of Object.keys(incoming)) {
        if (!existing[key]) existing[key] = [];
        const existingIds = new Set(existing[key].map(c => c.id));
        for (const c of incoming[key]) {
          if (!existingIds.has(c.id)) { existing[key].push(c); merged++; }
        }
      }
      saveComments(existing);
      renderComments();
      updateCommentsBadge();
      alert(merged + ' ' + UI_STRINGS[currentLang].commentsImportMerge);
    } catch { alert('Erro ao importar ficheiro.'); }
    evt.target.value = '';
  };
  reader.readAsText(file);
}

// ── HELPERS ────────────────────────────────────────────
function parseAccent(text) {
  return text
    .replace(/<accent>(.*?)<\/accent>/g, '<span class="accent">$1</span>')
    .replace(/<accent-how>(.*?)<\/accent-how>/g, '<span class="accent-how">$1</span>')
    .replace(/<accent-what>(.*?)<\/accent-what>/g, '<span class="accent-what">$1</span>');
}
function tag(section) {
  if (!section) return '';
  return `<div class="section-tag tag-${section}">${section.toUpperCase()}</div>`;
}
function calloutHtml(text, cls) {
  return `<div class="callout ${cls||''}"><p>${text}</p></div>`;
}

// ── RENDERERS ───────────────────────────────────────────
const render = {

  cover(d) {
    return `
      <div class="cover-grid"></div>
      <div class="cover-glow"></div>
      <div class="cover-logo">${d.logo}</div>
      <div class="cover-title"><span class="accent">${d.titleAccent}</span> ${d.titleLine1}<br>${d.titleLine2}</div>
      <div class="cover-sub">${d.subtitle}</div>
      ${d.tags && d.tags.length ? `<div class="cover-tags">${d.tags.map((t,i)=>`<span class="cover-tag ct-${['why','how','what'][i]}">${t}</span>`).join('')}</div>` : ''}`;
  },

  stats(d) {
    const colorMap = { green:'var(--green)', how:'var(--how)', what:'var(--what)' };
    return `
      ${tag(null)}
      <div class="headline">${parseAccent(d.headline)}</div>
      <div class="subheadline">${d.subheadline}</div>
      <div class="stat-row">
        ${d.stats.map(s=>`
          <div class="stat-box">
            <div class="stat-num" style="color:${colorMap[s.color]||'var(--green)'}">${s.num}</div>
            <div class="stat-label">${s.label}</div>
          </div>`).join('')}
      </div>
      ${calloutHtml(d.callout)}`;
  },

  'two-col'(d) {
    function colHtml(col) {
      const cls = col.color === 'red' ? 'red' : '';
      return `<div class="col-block ${cls}">
        <h3>${col.icon} ${col.title}</h3>
        <ul>${col.items.map(i=>`<li>${i}</li>`).join('')}</ul>
      </div>`;
    }
    return `
      ${tag(null)}
      <div class="headline">${parseAccent(d.headline)}</div>
      <div class="subheadline">${d.subheadline}</div>
      <div class="two-col">
        ${colHtml(d.col1)}
        ${colHtml(d.col2)}
      </div>
      ${calloutHtml(d.callout)}`;
  },

  cards(d) {
    const cls = d.accent === 'how' ? 'b' : d.accent === 'what' ? 'p' : 'g';
    const calloutCls = d.accent === 'how' ? 'how' : d.accent === 'what' ? 'what' : '';
    return `
      ${tag(null)}
      <div class="headline">${parseAccent(d.headline)}</div>
      <div class="subheadline">${d.subheadline}</div>
      <div class="cards-row">
        ${d.cards.map(c=>`
          <div class="card ${cls}">
            ${c.icon ? `<div class="card-icon">${c.icon}</div>` : ''}
            <div class="card-title">${c.title}</div>
            <div class="card-body">${c.body}</div>
          </div>`).join('')}
      </div>`;
  },

  'cards-consequence'(d) {
    const cls = d.accent === 'how' ? 'b' : d.accent === 'what' ? 'p' : 'g';
    const [c1, c2, c3] = d.cards;
    return `
      ${tag(null)}
      <div class="headline">${parseAccent(d.headline)}</div>
      <div class="subheadline">${d.subheadline}</div>
      <div class="cc-top">
        <div class="card ${cls}">
          ${c1.icon ? `<div class="card-icon">${c1.icon}</div>` : ''}
          <div class="card-title">${c1.title}</div>
          <div class="card-body">${c1.body}</div>
        </div>
        <div class="card ${cls}">
          ${c2.icon ? `<div class="card-icon">${c2.icon}</div>` : ''}
          <div class="card-title">${c2.title}</div>
          <div class="card-body">${c2.body}</div>
        </div>
      </div>
      <div class="cc-connectors">
        <svg viewBox="0 0 860 48" preserveAspectRatio="none">
          <path d="M215,0 L430,44" stroke="rgba(134,188,37,0.45)" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
          <path d="M645,0 L430,44" stroke="rgba(134,188,37,0.45)" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
          <circle cx="430" cy="44" r="3.5" fill="var(--green)" opacity="0.7"/>
        </svg>
      </div>
      <div class="cc-bottom">
        <div class="card-consequence">
          <div class="consequence-label">${UI_STRINGS[currentLang].consequenceLabel}</div>

          <div class="card-body">${c3.body}</div>
        </div>

  },

  'vibe-coding'(d) {
    return `
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:10;"><span style="font-size:clamp(6rem,18vw,14rem);font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,180,0,0.12);transform:rotate(-15deg);user-select:none;white-space:nowrap;">${UI_STRINGS[currentLang].reviewWatermark}</span></div>

  'agent-diagram'(d) {
    return `
      ${tag(null)}

        <div class="agent-orch">

  cycle(d) {
    const steps = d.steps.map((s,i)=> {

      return `<div class="cycle-step">

  pillars(d) {
    return `

            <div class="pillar-icon">${p.icon}</div>
            <div class="pillar-title">${p.title}</div>

  tco(d) {
    const headCells = d.columns.map(c=>`<th class="${c.class}">${c.label}<br><span style="font-weight:400;color:var(--text-muted)">${c.sublabel}</span></th>`).join('');
    const rows = d.rows.map(r=>`
      <tr>

        <td class="v-green">${r.values[0]}</td>
        <td class="${r.highlight ? 'v-red' : ''}">${r.values[1]}</td>
        <td class="${r.highlight ? 'v-red' : ''}">${r.values[2]}</td>
      </tr>`).join('');
    const totalRow = `
      <tr class="tco-total">
        <td class="row-label">${d.total.label}</td>
        <td class="v-green">${d.total.values[0]}</td>
        <td style="color:#e05555;font-weight:800">${d.total.values[1]}</td>
        <td style="color:#e05555;font-weight:800">${d.total.values[2]}</td>
      </tr>`;
    return `
      ${tag(null)}
      <div class="headline">${parseAccent(d.headline)}</div>
      <div class="subheadline">${d.subheadline}</div>
      <div class="tco-wrap">
        <table class="tco-table">
          <thead><tr><th>${UI_STRINGS[currentLang].tcoComponentLabel}</th>${headCells}</tr></thead>
          <tbody>${rows}${totalRow}</tbody>

      <div class="tco-note">${d.note}</div>`;

  prototype(d) {
    const frames = d.frames.map(f=>`
      <div class="proto-frame">
        <div class="proto-bar">
          <div class="proto-dot" style="background:#ff5f57"></div>
          <div class="proto-dot" style="background:#febc2e"></div>
          <div class="proto-dot" style="background:#28c840"></div>
        </div>
        <div class="proto-icon">${f.icon}</div>
        <div class="proto-label">${f.label}</div>
        <div class="proto-sub">${f.sub}</div>
      </div>`).join('');
    return `
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:10;"><span style="font-size:clamp(6rem,18vw,14rem);font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,180,0,0.12);transform:rotate(-15deg);user-select:none;white-space:nowrap;">${UI_STRINGS[currentLang].reviewWatermark}</span></div>
      ${tag(null)}
      <div class="headline">${parseAccent(d.headline)}</div>
      <div class="subheadline">${d.subheadline}</div>
      <div class="proto-grid">${frames}</div>
      <div style="font-size:10.5px;color:var(--text-muted);margin-top:12px;text-align:center">${d.note}</div>`;
  },

  'epic-table'(d) {
    const rows = d.epics.map(e=>`
      <tr>
        <td class="epic-name">${e.name}</td>
        <td>${e.desc}</td>
        <td><span class="badge badge-${e.phase}">${e.phase === 'poc' ? 'POC' : e.phase === 'tobe' ? 'TO BE' : e.phase === 'mvp' ? 'MVP' : 'Full'}</span></td>
      </tr>`).join('');
    return `
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:10;"><span style="font-size:clamp(6rem,18vw,14rem);font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,180,0,0.12);transform:rotate(-15deg);user-select:none;white-space:nowrap;">${UI_STRINGS[currentLang].reviewWatermark}</span></div>
      ${tag(null)}
      <div class="headline">${parseAccent(d.headline)}</div>
      <div class="subheadline">${d.subheadline}</div>
      <div class="epic-wrap">
        <table class="epic-table">
          <thead><tr><th>${UI_STRINGS[currentLang].epicEpicLabel}</th><th>${UI_STRINGS[currentLang].epicDescLabel}</th><th>${UI_STRINGS[currentLang].epicPhaseLabel}</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  },

  roadmap(d) {
    const phases = d.phases.map(p=>`
      <div class="rm-phase">
        <div class="rm-dot ${p.dotClass}"></div>
        <div class="rm-card">
          <div class="rm-duration">${p.duration}</div>
          <div class="rm-title" style="color:var(--${p.titleColor === 'green' ? 'green' : p.titleColor === 'how' ? 'how' : 'what'})">${p.title}</div>
          <div class="rm-items">${p.items.join('<br>')}</div>
        </div>
      </div>`).join('');
    return `
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:10;"><span style="font-size:clamp(6rem,18vw,14rem);font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,180,0,0.12);transform:rotate(-15deg);user-select:none;white-space:nowrap;">${UI_STRINGS[currentLang].reviewWatermark}</span></div>
      ${tag(null)}
      <div class="headline">${parseAccent(d.headline)}</div>
      <div class="subheadline">${d.subheadline}</div>
      <div class="roadmap-row">${phases}</div>`;
  },

  'logo-end'(d) {
    return `
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
        <div style="font-size:clamp(5rem,14vw,13rem);font-weight:900;letter-spacing:-.03em;color:#fff;line-height:1;user-select:none;">
          ${d.name}<span style="color:var(--green);">.</span>
        </div>
      </div>`;
  },

  'two-paths'(d) {
    function itemsHtml(items, colorVar) {
      return items.map(i=>`<li><span class="tp-bullet" style="color:${colorVar}">▸</span>${i}</li>`).join('');
    }
    const p1 = d.path1, p2 = d.path2;
    return `
      ${tag(null)}
      <div class="headline">${parseAccent(d.headline)}</div>
      <div class="subheadline">${d.subheadline}</div>
      <div class="tp-row">
        <div class="tp-card tp-card-how">
          <div class="tp-icon">${p1.icon}</div>
          <div class="tp-title" style="color:var(--how)">${p1.title}</div>
          <div class="tp-body">${p1.body}</div>
          <ul class="tp-items">${itemsHtml(p1.items, 'var(--how)')}</ul>
          ${p1.tag ? `<div class="tp-next-tag">${p1.tag.text}</div>` : ''}
        </div>
        <div class="tp-divider"><div class="tp-or">${d.orLabel}</div></div>
        <div class="tp-card tp-card-green">
          <div class="tp-icon">${p2.icon}</div>
          <div class="tp-title" style="color:var(--green)">${p2.title}</div>
          <div class="tp-body">${p2.body}</div>
          <div class="tp-accel-label">${p2.accel.label}</div>
          <ul class="tp-items">${itemsHtml(p2.accel.items, 'var(--green)')}</ul>

  closing(d) {
    return `
      <div class="cover-grid" style="opacity:.4"></div>
      <div class="cover-glow" style="background:radial-gradient(circle,rgba(0,180,216,.04) 0%,transparent 70%)"></div>
      <div class="closing-title">${d.titleLine1} <span class="accent">${d.titleLine2}</span></div>
      <div class="closing-items">
        ${d.items.map(i=>`
          <div class="closing-item">
            <div class="ci-num">${i.num}</div>
            <div class="ci-text">${i.text}</div>
          </div>`).join('')}
      </div>`;
  }
};

// ── LANGUAGE & DECK ──────────────────────────────────────
const deck = document.getElementById('deck');
const pills = document.querySelectorAll('#section-indicator .pill');
let currentLang = 'pt';
let current = 0, animating = false;

function allSlides() { return document.querySelectorAll('.slide'); }

function buildDeck(keepIndex) {
  const prevIndex = keepIndex ? current : 0;
  deck.innerHTML = '';
  const slides = (currentLang === 'pt' ? SLIDES : SLIDES_EN).filter(s => !s.hidden);
  slides.forEach((slide, i) => {
    const el = document.createElement('div');
    el.className = 'slide';
    el.dataset.section = slide.section || '';
    const raw = render[slide.type]
      ? render[slide.type](slide.data)
      : `<p>${UI_STRINGS[currentLang].unknownSlide}</p>`;
    if (slide.section && !raw.includes('section-tag')) {
      el.innerHTML = `<div class="section-tag tag-${slide.section}">${slide.section.toUpperCase()}</div>` + raw;
    } else {
      el.innerHTML = raw;
    }
    deck.appendChild(el);
  });
  current = Math.min(prevIndex, allSlides().length - 1);
  allSlides()[current].classList.add('active');
  updateUI();
}

function setLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;
  buildDeck(true);
  updateLoginLang();
  updateCommentsPanelStrings();
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active-lang', b.dataset.lang === lang);
  });
}

// ── NAVIGATION ───────────────────────────────────────────
function updateUI() {
  const slides = allSlides();
  const total = slides.length;
  document.getElementById('progress').style.width = ((current+1)/total*100)+'%';
  document.getElementById('slide-counter').textContent = (current+1)+' / '+total;
  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').disabled = current === total-1;

  pills.forEach(p => p.classList.remove('on'));
  const sec = slides[current].dataset.section;
  if (sec) {
    const p = document.querySelector(`.pill.${sec}-p`);
    if (p) p.classList.add('on');
  }
  updateCommentsBadge();
  if (commentsOpen) renderComments();
}

function goToSection(section) {
  const idx = Array.from(allSlides()).findIndex(s => s.dataset.section === section);
  if (idx === -1 || idx === current) return;
  goToIndex(idx);
}

function goToIndex(idx) {
  if (animating || idx === current) return;
  animating = true;
  const slides = allSlides();
  const dir = idx > current ? 1 : -1;
  const cur = slides[current];
  const nxt = slides[idx];

  cur.classList.remove('active');
  cur.classList.add('exit');
  nxt.style.transform = `translateX(${dir > 0 ? 60 : -60}px)`;
  nxt.offsetHeight;
  nxt.style.transform = '';
  nxt.classList.add('active');

  setTimeout(() => { cur.classList.remove('exit'); animating = false; }, 560);
  current = idx;
  updateUI();
}

function navigate(dir) {
  if (animating) return;
  const slides = allSlides();
  const next = current + dir;
  if (next < 0 || next >= slides.length) return;
  animating = true;

  const cur = slides[current];
  const nxt = slides[next];

  cur.classList.remove('active');
  cur.classList.add('exit');
  nxt.style.transform = `translateX(${dir > 0 ? 60 : -60}px)`;
  nxt.offsetHeight;
  nxt.style.transform = '';
  nxt.classList.add('active');

  setTimeout(() => { cur.classList.remove('exit'); animating = false; }, 560);
  current = next;
  updateUI();
}

document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  if (['ArrowRight','ArrowDown',' '].includes(e.key)) { e.preventDefault(); navigate(1); }
  if (['ArrowLeft','ArrowUp'].includes(e.key)) { e.preventDefault(); navigate(-1); }
});

let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend',   e => {
  const d = tx - e.changedTouches[0].clientX;
  if (Math.abs(d) > 50) navigate(d > 0 ? 1 : -1);
});

buildDeck();
</script>
